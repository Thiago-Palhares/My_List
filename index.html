<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>Minhas Listas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0ece4;
      --text2: rgba(240,236,228,0.5);
      --text3: rgba(240,236,228,0.25);
      --accent-tarefas: #c8f56a;
      --accent-compras: #6af5c2;
      --accent-trabalho: #f5a66a;
      --radius: 14px;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; padding: 0 0 80px; }

    header { padding: 52px 24px 0; margin-bottom: 28px; }
    header h1 { font-size: 26px; font-weight: 300; letter-spacing: -0.5px; }
    header p { font-size: 12px; color: var(--text3); margin-top: 4px; font-family: 'DM Mono', monospace; }

    .abas { display: flex; gap: 8px; padding: 0 24px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
    .abas::-webkit-scrollbar { display: none; }
    .aba-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .aba-btn .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.4; }
    .aba-btn.ativa { border-color: transparent; color: #0f0f0f; font-weight: 500; }
    .aba-btn.ativa .dot { opacity: 1; background: rgba(0,0,0,0.3); }
    .aba-btn.ativa[data-aba="tarefas"] { background: var(--accent-tarefas); }
    .aba-btn.ativa[data-aba="compras"] { background: var(--accent-compras); }
    .aba-btn.ativa[data-aba="trabalho"] { background: var(--accent-trabalho); }

    .input-area { padding: 0 24px; margin-bottom: 12px; display: flex; gap: 10px; }
    .input-area input { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.15s; }
    .input-area input::placeholder { color: var(--text3); }
    .input-area input:focus { border-color: var(--border2); }
    .input-area button { width: 50px; height: 50px; border-radius: var(--radius); border: none; background: var(--bg3); color: var(--text); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; flex-shrink: 0; }
    .input-area button:active { transform: scale(0.92); }

    .prio-seletor { display: flex; align-items: center; gap: 10px; padding: 0 24px; margin-bottom: 20px; }
    .prio-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
    .prio-dots { display: flex; gap: 10px; }
    .prio-dot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; padding: 0; transition: all 0.15s; }
    .prio-dot[data-p="baixa"] { border-color: #3a5c3a; }
    .prio-dot[data-p="media"] { border-color: #5c4d1a; }
    .prio-dot[data-p="alta"]  { border-color: #5c3a3a; }
    .prio-dot.sel[data-p="baixa"] { background: #7ec87e; border-color: #7ec87e; box-shadow: 0 0 0 3px rgba(126,200,126,0.18); }
    .prio-dot.sel[data-p="media"] { background: #d4b84a; border-color: #d4b84a; box-shadow: 0 0 0 3px rgba(212,184,74,0.18); }
    .prio-dot.sel[data-p="alta"]  { background: #c87e7e; border-color: #c87e7e; box-shadow: 0 0 0 3px rgba(200,126,126,0.18); }

    .lista { padding: 0 24px; }
    .vazio { text-align: center; color: var(--text3); font-size: 13px; padding: 48px 0; font-family: 'DM Mono', monospace; }

    .item { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; background: var(--bg2); overflow: hidden; transition: opacity 0.15s, border-color 0.15s, background 0.15s; }
    .item.arrastando { opacity: 0.35; border-style: dashed; }
    .item.sobre { border-color: var(--border2); background: var(--bg3); }

    .item-top { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }

    .drag-handle { width: 20px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: grab; color: var(--text3); flex-shrink: 0; touch-action: none; user-select: none; }
    .drag-handle:active { cursor: grabbing; }

    .check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
    .check.quadrado { border-radius: 5px; }
    .check.feito { border-color: transparent; background: #2e5c2e; }

    .item-info { flex: 1; min-width: 0; cursor: pointer; }
    .item-titulo { font-size: 14px; color: var(--text); line-height: 1.4; }
    .item-titulo.riscado { text-decoration: line-through; color: var(--text3); }

    .prio-badge { font-size: 10px; padding: 1px 8px; border-radius: 100px; margin-top: 4px; display: inline-block; font-family: 'DM Mono', monospace; }
    .prio-badge.baixa { background: #1a2e1a; color: #7ec87e; }
    .prio-badge.media { background: #2e2600; color: #d4b84a; }
    .prio-badge.alta  { background: #2e1a1a; color: #c87e7e; }

    .acoes { display: flex; gap: 2px; flex-shrink: 0; }
    .icon-btn { width: 30px; height: 30px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text3); transition: all 0.15s; }
    .icon-btn:hover { background: var(--bg3); color: var(--text2); }

    .item-body { border-top: 1px solid var(--border); padding: 12px 14px; display: none; }
    .item-body.aberto { display: block; }

    .edit-field { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; margin-bottom: 8px; }
    .edit-acoes { display: flex; gap: 8px; }
    .edit-acoes button { padding: 5px 14px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .edit-acoes button:first-child { color: var(--accent-tarefas); border-color: var(--accent-tarefas); }

    .desc-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
    .desc-field { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text2); resize: vertical; min-height: 70px; outline: none; transition: border-color 0.15s; }
    .desc-field:focus { border-color: var(--border2); }
    .desc-field::placeholder { color: var(--text3); }

    .rodape { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
    .rodape span { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }
    .rodape button { font-size: 12px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); font-size: 12px; padding: 7px 18px; border-radius: 100px; font-family: 'DM Mono', monospace; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
    .toast.visivel { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>Minhas listas</h1>
  <p id="data-hoje"></p>
</header>

<div class="abas">
  <button class="aba-btn ativa" data-aba="tarefas" onclick="trocarAba('tarefas')"><span class="dot"></span>Tarefas</button>
  <button class="aba-btn" data-aba="compras" onclick="trocarAba('compras')"><span class="dot"></span>Compras</button>
  <button class="aba-btn" data-aba="trabalho" onclick="trocarAba('trabalho')"><span class="dot"></span>Trabalho</button>
</div>

<div class="input-area">
  <input type="text" id="input-item" placeholder="O que precisa ser feito?" />
  <button onclick="adicionarItem()">+</button>
</div>

<div class="prio-seletor" id="prio-seletor">
  <span class="prio-label">prioridade</span>
  <div class="prio-dots">
    <button class="prio-dot sel" data-p="baixa" onclick="selecionarPrio('baixa')" title="Baixa"></button>
    <button class="prio-dot" data-p="media" onclick="selecionarPrio('media')" title="Média"></button>
    <button class="prio-dot" data-p="alta" onclick="selecionarPrio('alta')" title="Alta"></button>
  </div>
</div>

<div class="lista" id="lista"></div>
<div class="toast" id="toast">Salvo</div>

<script>
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const hoje = new Date();
  document.getElementById('data-hoje').textContent = hoje.getDate() + ' ' + meses[hoje.getMonth()] + ' ' + hoje.getFullYear();

  function carregarDados() {
    try { const s = localStorage.getItem('listas-v3'); if (s) return JSON.parse(s); } catch(e) {}
    return { tarefas:[], compras:[], trabalho:[] };
  }

  let dados = carregarDados();
  let abaAtual = 'tarefas';
  let prioAtual = 'baixa';
  let expandidos = {};
  let editando = null;
  let timerToast;
  const placeholders = { tarefas:'O que precisa ser feito?', compras:'O que precisa comprar?', trabalho:'Qual tarefa de trabalho?' };
  const temPrio = ['tarefas','trabalho'];

  function salvar() {
    try { localStorage.setItem('listas-v3', JSON.stringify(dados)); } catch(e) {}
    const t = document.getElementById('toast');
    t.classList.add('visivel');
    clearTimeout(timerToast);
    timerToast = setTimeout(() => t.classList.remove('visivel'), 1400);
  }

  function trocarAba(aba) {
    abaAtual = aba; editando = null;
    document.getElementById('input-item').placeholder = placeholders[aba];
    document.querySelectorAll('.aba-btn').forEach(b => b.classList.toggle('ativa', b.dataset.aba === aba));
    document.getElementById('prio-seletor').style.display = temPrio.includes(aba) ? 'flex' : 'none';
    renderizar();
  }

  function selecionarPrio(p) {
    prioAtual = p;
    document.querySelectorAll('.prio-dot').forEach(b => { b.classList.toggle('sel', b.dataset.p === p); });
  }

  function adicionarItem() {
    const input = document.getElementById('input-item');
    const texto = input.value.trim();
    if (!texto) return;
    dados[abaAtual].unshift({ texto, feito:false, id:Date.now(), prio: temPrio.includes(abaAtual) ? prioAtual : null, desc:'' });
    input.value = ''; salvar(); renderizar(); input.focus();
  }

  function toggleItem(id) {
    if (editando === id) return;
    const item = dados[abaAtual].find(i => i.id === id);
    if (item) item.feito = !item.feito;
    salvar(); renderizar();
  }

  function toggleExpand(id) { expandidos[id] = !expandidos[id]; renderizar(); }

  function removerItem(id) {
    dados[abaAtual] = dados[abaAtual].filter(i => i.id !== id);
    delete expandidos[id]; salvar(); renderizar();
  }

  function iniciarEdicao(id) {
    editando = id; expandidos[id] = true; renderizar();
    setTimeout(() => { const f = document.getElementById('edit-'+id); if(f){f.focus();f.select();} }, 50);
  }

  function salvarEdicao(id) {
    const f = document.getElementById('edit-'+id); if (!f) return;
    const texto = f.value.trim();
    if (texto) { const item = dados[abaAtual].find(i => i.id===id); if(item) item.texto=texto; salvar(); }
    editando = null; renderizar();
  }

  function cancelarEdicao() { editando = null; renderizar(); }

  function salvarDesc(id) {
    const el = document.getElementById('desc-'+id); if (!el) return;
    const item = dados[abaAtual].find(i => i.id===id);
    if (item) { item.desc = el.value; salvar(); }
  }

  function limparConcluidas() {
    dados[abaAtual] = dados[abaAtual].filter(i => !i.feito);
    salvar(); renderizar();
  }

  // DRAG & DROP mouse
  let dragSrcId = null;

  function onDragStart(e, id) {
    dragSrcId = id; e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => { const el = document.querySelector('.item[data-id="'+id+'"]'); if(el) el.classList.add('arrastando'); }, 0);
  }

  function onDragOver(e, id) {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.item').forEach(el => el.classList.remove('sobre'));
    if (id !== dragSrcId) { const el = document.querySelector('.item[data-id="'+id+'"]'); if(el) el.classList.add('sobre'); }
  }

  function onDrop(e, id) {
    e.preventDefault();
    if (dragSrcId === null || dragSrcId === id) return;
    const lista = dados[abaAtual];
    const fromIdx = lista.findIndex(i => i.id === dragSrcId);
    const toIdx = lista.findIndex(i => i.id === id);
    if (fromIdx < 0 || toIdx < 0) return;
    const [moved] = lista.splice(fromIdx, 1);
    lista.splice(toIdx, 0, moved);
    dragSrcId = null; salvar(); renderizar();
  }

  function onDragEnd() {
    dragSrcId = null;
    document.querySelectorAll('.item').forEach(el => el.classList.remove('arrastando','sobre'));
  }

  // DRAG & DROP touch
  let touchDragId = null, touchClone = null, touchOffsetY = 0;

  function onTouchStart(e, id) {
    touchDragId = id;
    const touch = e.touches[0];
    const el = document.querySelector('.item[data-id="'+id+'"]');
    const rect = el.getBoundingClientRect();
    touchOffsetY = touch.clientY - rect.top;
    touchClone = el.cloneNode(true);
    touchClone.style.cssText = 'position:fixed;left:'+rect.left+'px;top:'+rect.top+'px;width:'+rect.width+'px;opacity:0.85;pointer-events:none;z-index:1000;border-radius:14px;background:#242424;border:1px solid rgba(255,255,255,0.14);';
    document.body.appendChild(touchClone);
    el.classList.add('arrastando');
  }

  function onTouchMove(e) {
    if (!touchDragId) return;
    e.preventDefault();
    const touch = e.touches[0];
    if (touchClone) touchClone.style.top = (touch.clientY - touchOffsetY) + 'px';
    document.querySelectorAll('.item').forEach(el => el.classList.remove('sobre'));
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    const itemEl = target && target.closest('.item');
    if (itemEl && itemEl.dataset.id && parseInt(itemEl.dataset.id) !== touchDragId) itemEl.classList.add('sobre');
  }

  function onTouchEnd(e) {
    if (!touchDragId) return;
    const touch = e.changedTouches[0];
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    const itemEl = target && target.closest('.item');
    if (itemEl && itemEl.dataset.id) {
      const toId = parseInt(itemEl.dataset.id);
      if (toId !== touchDragId) {
        const lista = dados[abaAtual];
        const fromIdx = lista.findIndex(i => i.id === touchDragId);
        const toIdx = lista.findIndex(i => i.id === toId);
        if (fromIdx >= 0 && toIdx >= 0) { const [moved] = lista.splice(fromIdx, 1); lista.splice(toIdx, 0, moved); salvar(); }
      }
    }
    if (touchClone) { touchClone.remove(); touchClone = null; }
    touchDragId = null; renderizar();
  }

  document.addEventListener('touchmove', onTouchMove, { passive: false });
  document.addEventListener('touchend', onTouchEnd);

  function renderizar() {
    const el = document.getElementById('lista');
    const items = dados[abaAtual];
    const usaPrio = temPrio.includes(abaAtual);
    const checkClass = abaAtual === 'compras' ? 'check quadrado' : 'check';

    if (!items.length) { el.innerHTML = '<div class="vazio">— lista vazia —<br>Adicione um item acima!</div>'; return; }

    const pendentes = items.filter(i => !i.feito).length;

    el.innerHTML = items.map(function(item) {
      const aberto = expandidos[item.id];
      const editandoEste = editando === item.id;
      const badge = (usaPrio && item.prio) ? '<span class="prio-badge '+item.prio+'">'+item.prio+'</span>' : '';
      const checkSVG = item.feito ? '<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><polyline points="1,4 3.5,6.5 9,1" stroke="#7ec87e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '';

      const tituloHTML = editandoEste ? '' :
        '<div class="item-info" onclick="toggleExpand('+item.id+')">' +
          '<div class="item-titulo'+(item.feito?' riscado':'')+'">'+item.texto+'</div>'+badge+
        '</div>';

      const editHTML = editandoEste ?
        '<div class="item-info">' +
          '<input class="edit-field" id="edit-'+item.id+'" value="'+item.texto.replace(/"/g,'&quot;')+'" onkeydown="if(event.key===\'Enter\')salvarEdicao('+item.id+');if(event.key===\'Escape\')cancelarEdicao();" />' +
          '<div class="edit-acoes"><button onclick="salvarEdicao('+item.id+')">✓ Salvar</button><button onclick="cancelarEdicao()">✕ Cancelar</button></div>' +
        '</div>' : '';

      const bodyHTML = (aberto && abaAtual !== 'compras') ?
        '<div class="item-body aberto"><p class="desc-label">descrição</p>' +
          '<textarea class="desc-field" id="desc-'+item.id+'" placeholder="Adicione detalhes..." onchange="salvarDesc('+item.id+')">'+(item.desc||'')+'</textarea>' +
        '</div>' : '';

      const botoesExtra = abaAtual !== 'compras' ?
        '<button class="icon-btn" onclick="iniciarEdicao('+item.id+')" title="Editar"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 12l3-1L11.5 3.5a1.5 1.5 0 0 0-2-2L2 9l-1 3z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>' +
        '<button class="icon-btn" onclick="toggleExpand('+item.id+')" title="Descrição"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.3"/><line x1="3.5" y1="4.5" x2="9.5" y2="4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="3.5" y1="7" x2="7.5" y2="7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>' : '';

      return '<div class="item" data-id="'+item.id+'" draggable="true" ondragstart="onDragStart(event,'+item.id+')" ondragover="onDragOver(event,'+item.id+')" ondrop="onDrop(event,'+item.id+')" ondragend="onDragEnd()">' +
        '<div class="item-top">' +
          '<div class="drag-handle" ontouchstart="onTouchStart(event,'+item.id+')">' +
            '<svg width="10" height="14" viewBox="0 0 10 14" fill="none"><circle cx="3" cy="2.5" r="1.2" fill="currentColor"/><circle cx="7" cy="2.5" r="1.2" fill="currentColor"/><circle cx="3" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="3" cy="11.5" r="1.2" fill="currentColor"/><circle cx="7" cy="11.5" r="1.2" fill="currentColor"/></svg>' +
          '</div>' +
          '<div class="'+checkClass+(item.feito?' feito':'')+'" onclick="toggleItem('+item.id+')">'+checkSVG+'</div>' +
          tituloHTML + editHTML +
          '<div class="acoes">'+botoesExtra+
            '<button class="icon-btn" onclick="removerItem('+item.id+')" title="Remover"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>' +
          '</div>' +
        '</div>' + bodyHTML +
      '</div>';
    }).join('');

    el.innerHTML += '<div class="rodape"><span>'+(pendentes===0?'tudo feito!':pendentes+' pendente'+(pendentes>1?'s':''))+'</span>'+(items.some(i=>i.feito)?'<button onclick="limparConcluidas()">limpar concluídas</button>':'')+'</div>';
  }

  document.getElementById('input-item').addEventListener('keydown', e => { if(e.key==='Enter') adicionarItem(); });
  renderizar();
</script>
</body>
</html>
